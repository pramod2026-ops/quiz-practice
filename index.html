<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylefinal.css">
    <title>Practice Quiz</title>
</head>
<body>
<!-- Start Screen Container  -->

    <div class="container">
        <div class="screen active" id="start-screen">
       <h1>🩺 Nursing Practice Hub</h1>
        <p>Sharpen your nursing knowledge through interactive quizzes.</p>
        <button class="start-btn" id="start-btn">Begin Practice</button> 
     </div>

<!-- quiz Questions and Score section display after clickig Start Quiz button -->


     <div class="screen" id="quiz-screen">
        <div class="quiz-header">
            <h2 id="question-text"></h2>
            <div class="quiz-info">
                <p>Question <span id="current-question">1</span> of <span id="total-questions">all</span>
                </p>
                <p>Score: <span id="score">0</span></p>
                <p class="motivation">Keep building your nursing knowledge one question at a time 🌱</p>
            </div>
        </div>


<!-- Answers options container  -->
        <div id="answers-container">
            
        </div>

<!-- Progress-bar section-->
        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
     </div>

     <!-- Result Section -->
     <div id="result-screen" class="screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
            <p>You scored <span id="final-score">0</span> out of <span id="max-score">25</span></p>
            <div id="result-message">Good job!</div>
        </div>
        <div class="result-actions">
  <button id="next-set-btn">Next Set</button>
  <button id="restart-btn">Restart Quiz</button>
</div>
    </div>
    </div>
    <script src="./script.js"></script>

</body>
</html>
